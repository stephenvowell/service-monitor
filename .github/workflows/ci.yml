name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Tk + dev deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  build:
    name: Build Windows exe
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build
        run: >
          python -m PyInstaller --noconfirm --clean
          --name ServiceHealthMonitor --onefile --windowed
          service_monitor.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ServiceHealthMonitor-exe
          path: dist/ServiceHealthMonitor.exe
